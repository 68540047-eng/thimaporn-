<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>FizzBuzz ง่ายๆ</title>
    <style>
        body { background-color: #fff9c4; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .card { background: white; display: inline-block; padding: 20px; border-radius: 10px; border: 1px solid #ccc; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #ddd; font-weight: bold; }
        #output { font-size: 40px; font-weight: bold; margin-top: 20px; color: #2c3e50; min-height: 50px; }
        #err { color: red; font-size: 14px; margin-top: 5px; height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h3>โปรแกรม FizzBuzz (1-100)</h3>
    <input type="number" id="num" placeholder="ใส่เลข 1-100">
    <button onclick="check()" style="background-color: #c8e6c9;">ตกลง</button>
    
    <button onclick="clearAll()" style="background-color: #ffcdd2; margin-left: 5px;">เคลียร์</button>
    
    <div id="err"></div>
    <div id="output">?</div>
</div>

<script>
function check() {
    let n = document.getElementById("num").value;
    let out = document.getElementById("output");
    let err = document.getElementById("err");

    err.innerText = "";

    if (n === "" || n < 1 || n > 100) {
        err.innerText = "ใส่เลข 1-100 เท่านั้น!";
        out.innerText = "?";
        return;
    }

    let num = parseInt(n);

    if (num % 3 === 0 && num % 5 === 0) {
        out.innerText = "FizzBuzz";
        out.style.color = "#e67e22"; 
    } else if (num % 3 === 0) {
        out.innerText = "Fizz";
        out.style.color = "#27ae60";
    } else if (num % 5 === 0) {
        out.innerText = "Buzz";
        out.style.color = "#2980b9";
    } else {
        out.innerText = num;
        out.style.color = "#2c3e50";
    }
}


function clearAll() {
    document.getElementById("num").value = "";
    document.getElementById("output").innerText = "?";
    document.getElementById("output").style.color = "#2c3e50";
    document.getElementById("err").innerText = "";
}
</script>

</body>
</html>
