<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เปลี่ยนสีหน้าเว็บ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            transition: background-color 0.3s ease; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: white; 
        }
        .container {
            display: flex;
            gap: 15px; 
        }
        button {
            padding: 30px 50px;
            font-size: 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            color: white; 
        }
        #green-btn { background-color: green; }
        #orange-btn { background-color: orange; }
        #purple-btn { background-color: purple; }
        #clear-btn { background-color: #f1f1f1; color: black; border: 1px solid #ccc; } 
    </style>
</head>
<body>

<div class="container">
    <button id="green-btn">เขียว</button>
    <button id="orange-btn">ส้ม</button>
    <button id="purple-btn">ม่วง</button>
    <button id="clear-btn">Clear</button>
</div>

<script>
    
    const greenBtn = document.getElementById('green-btn');
    const orangeBtn = document.getElementById('orange-btn');
    const purpleBtn = document.getElementById('purple-btn');
    const clearBtn = document.getElementById('clear-btn');

   
    const body = document.body;

  
    greenBtn.addEventListener('click', () => {
        body.style.backgroundColor = 'green';
    });

    orangeBtn.addEventListener('click', () => {
        body.style.backgroundColor = 'orange';
    });

    purpleBtn.addEventListener('click', () => {
        body.style.backgroundColor = 'purple';
    });

    clearBtn.addEventListener('click', () => {
        body.style.backgroundColor = 'white';
    });
</script>

</body>
</html>
