<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตารางสูตรคูณ</title>
</head>
<body>

    <h2>โปรแกรมตารางสูตรคูณ (5 - 18)</h2>

    <label>กรอกตัวเลข: </label>
    <input type="number" id="num">
    
    <button onclick="showTable()">แสดงผล</button>
    <button onclick="clearTable()">ล้างข้อมูล</button>

    <div id="result" style="margin-top: 20px;"></div>

    <script>
        function showTable() {
            let n = document.getElementById("num").value;
            let output = "";

            
            if (n === "") {
                alert("กรุณากรอกตัวเลขก่อนครับ");
                return;
            }

            for (let i = 5; i <= 18; i++) {
                output += n + " x " + i + " = " + (n * i) + "<br>";
            }

            document.getElementById("result").innerHTML = output;
        }

       
        function clearTable() {
            document.getElementById("num").value = "";     
            document.getElementById("result").innerHTML = ""; 
        }
    </script>

</body>
</html>
